{% extends "base.html" %}
{% block title %}New Campaign{% endblock %}
{% block content %}
<header class="page-head">
  <div>
    <p class="eyebrow">Module 2</p>
    <h1>Create campaign</h1>
  </div>
</header>

<section class="panel form-panel wide">
  <form method="post" class="stacked-form">
    <label>Campaign name<input type="text" name="name" required placeholder="July Newsletter"></label>
    <label>Subject line<input type="text" name="subject" required placeholder="Your July update is here 🚀"></label>

    <div class="two-col">
      <label>Campaign type
        <select name="campaign_type">
          <option value="promotional">Promotional</option>
          <option value="welcome">Welcome email</option>
          <option value="reminder">Reminder</option>
        </select>
      </label>
      <label>Target group
        <select name="group_id">
          <option value="">All active subscribers</option>
          {% for g in groups %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}
        </select>
      </label>
    </div>

    <label>Schedule (optional)
      <input type="datetime-local" name="scheduled_time">
      <span class="hint">Leave blank to save as draft and send manually.</span>
    </label>

    <label>Email content
      <textarea name="content" rows="10" required placeholder="Write your email content here. Basic HTML is supported."></textarea>
    </label>

    <div class="form-actions">
      <a href="{{ url_for('campaigns') }}" class="btn btn-ghost">Cancel</a>
      <button class="btn btn-primary" type="submit">Save campaign</button>
    </div>
  </form>
</section>
{% endblock %}
